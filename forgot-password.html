<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Құпия сөзді қалпына келтіру</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.svg" />
    <style>
      .step {
        display: none;
      }
      .step.active {
        display: block;
      }

      .step-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin-bottom: 28px;
      }
      .step-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #e0e0e0;
        color: #999;
        font-size: 13px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.3s,
          color 0.3s;
        position: relative;
        z-index: 1;
      }
      .step-dot.active {
        background: #3b82f6;
        color: #fff;
      }
      .step-dot.done {
        background: #43c97e;
        color: #fff;
      }
      .step-line {
        width: 48px;
        height: 3px;
        background: #e0e0e0;
        transition: background 0.3s;
      }
      .step-line.done {
        background: #43c97e;
      }

      .code-input-row {
        display: flex;
        gap: 10px;
      }
      .code-input-row input {
        flex: 1;
        letter-spacing: 4px;
        font-size: 20px;
        text-align: center;
      }

      .resend-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
      }
      .resend-btn {
        background: none;
        border: none;
        color: #3b82f6;
        cursor: pointer;
        font-size: 13px;
        padding: 0;
        text-decoration: underline;
      }
      .resend-btn:disabled {
        color: #aaa;
        text-decoration: none;
        cursor: default;
      }
      .timer-text {
        font-size: 13px;
        color: #999;
      }

      .email-display {
        font-weight: 600;
        color: #3b82f6;
      }
      .success-icon {
        font-size: 40px;
        text-align: center;
        margin-bottom: 8px;
      }

      .success-card {
        text-align: center;
        padding: 16px 0;
      }
      .success-card .success-icon {
        font-size: 56px;
        margin-bottom: 16px;
      }
      .success-card h2 {
        font-size: 20px;
        font-weight: 700;
        color: #333;
        margin-bottom: 8px;
      }
      .success-card p {
        color: #666;
        font-size: 14px;
        margin-bottom: 24px;
      }

      .error-message {
        display: none;
        color: #e74c3c;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .password-wrapper {
        position: relative;
      }
      .toggle-pw {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: #999;
        padding: 0;
        line-height: 1;
      }
      .password-wrapper input {
        padding-right: 44px;
      }
    </style>
  </head>
  <body class="login-page">
    <div class="language-switcher">
      <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">
        EN
      </button>
      <button
        class="lang-btn active"
        data-lang="kk"
        onclick="setLanguage('kk')"
      >
        KK
      </button>
      <button class="lang-btn" data-lang="ru" onclick="setLanguage('ru')">
        RU
      </button>
    </div>

    <div class="container">
      <div class="login-card">
        <div class="login-header">
          <h1>Құпия сөзді қалпына келтіру</h1>
          <p>Поштаңызға растау коды жіберіледі</p>
        </div>

        <div class="step-indicator">
          <div class="step-dot active" id="dot1">1</div>
          <div class="step-line" id="line1"></div>
          <div class="step-dot" id="dot2">2</div>
          <div class="step-line" id="line2"></div>
          <div class="step-dot" id="dot3">3</div>
        </div>

        <div id="step1" class="step active">
          <div class="form-group">
            <label>Электрондық пошта</label>
            <input type="email" id="email" placeholder="Поштаңызды енгізіңіз" />
          </div>
          <div id="step1Error" class="error-message"></div>
          <button class="login-button" id="sendCodeBtn" onclick="sendCode()">
            <span>Код жіберу</span>
          </button>
          <div class="signup-link" style="margin-top: 16px">
            <p><a href="index.html">← Кіру бетіне оралу</a></p>
          </div>
        </div>

        <div id="step2" class="step">
          <div class="success-icon">📧</div>
          <p style="text-align: center; margin-bottom: 20px">
            Растау коды мына поштаға жіберілді:<br />
            <span class="email-display" id="emailDisplay"></span>
          </p>
          <div class="form-group">
            <label>Растау коды</label>
            <div class="code-input-row">
              <input
                type="text"
                id="verifyCode"
                maxlength="6"
                placeholder="6 таңбалы код"
              />
            </div>
            <div class="resend-row">
              <button
                class="resend-btn"
                id="resendBtn"
                onclick="resendCode()"
                disabled
              >
                Қайта жіберу
              </button>
              <span class="timer-text" id="timerText"></span>
            </div>
          </div>
          <div id="step2Error" class="error-message"></div>
          <button class="login-button" onclick="verifyCode()">
            <span>Растау</span>
          </button>
          <button
            class="login-button"
            onclick="backToStep1()"
            style="background: #f0f0f0; color: #555; margin-top: 8px"
          >
            <span>Артқа</span>
          </button>
        </div>

        <div id="step3" class="step">
          <div class="form-group">
            <label>Жаңа құпия сөз</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="newPassword"
                placeholder="Жаңа құпия сөз енгізіңіз"
              />
              <button
                class="toggle-pw"
                type="button"
                onclick="togglePw('newPassword', this)"
              >
                👁
              </button>
            </div>
          </div>
          <div class="form-group">
            <label>Құпия сөзді растау</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Құпия сөзді қайта енгізіңіз"
              />
              <button
                class="toggle-pw"
                type="button"
                onclick="togglePw('confirmPassword', this)"
              >
                👁
              </button>
            </div>
          </div>
          <div id="step3Error" class="error-message"></div>
          <button class="login-button" id="resetBtn" onclick="submitReset()">
            <span>Сақтау</span>
          </button>
        </div>

        <div id="step4" class="step">
          <div class="success-card">
            <div class="success-icon">✅</div>
            <h2>Құпия сөз өзгертілді!</h2>
            <p>Жаңа құпия сөзіңізбен кіре аласыз.</p>
            <a
              href="index.html"
              class="login-button"
              style="display: block; text-align: center; text-decoration: none"
            >
              <span>Кіру бетіне өту</span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="translations.js"></script>
    <script>
      const API = "http://localhost:5000";
      let timerInterval = null;
      let verifiedEmail = "";

      function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = "block";
      }
      function hideError(id) {
        const el = document.getElementById(id);
        el.textContent = "";
        el.style.display = "none";
      }

      function setStep(n) {
        document
          .querySelectorAll(".step")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById("step" + n).classList.add("active");
        for (let i = 1; i <= 3; i++) {
          const dot = document.getElementById("dot" + i);
          if (!dot) continue;
          dot.classList.remove("active", "done");
          if (i < n) dot.classList.add("done");
          else if (i === n) dot.classList.add("active");
        }
        for (let i = 1; i <= 2; i++) {
          const line = document.getElementById("line" + i);
          if (!line) continue;
          line.classList.toggle("done", i < n);
        }
      }

      function startTimer(seconds) {
        clearInterval(timerInterval);
        const resendBtn = document.getElementById("resendBtn");
        const timerText = document.getElementById("timerText");
        resendBtn.disabled = true;
        let remaining = seconds;
        timerText.textContent = `${remaining}с`;
        timerInterval = setInterval(() => {
          remaining--;
          timerText.textContent = remaining > 0 ? `${remaining}с` : "";
          if (remaining <= 0) {
            clearInterval(timerInterval);
            resendBtn.disabled = false;
          }
        }, 1000);
      }

      function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "🙈";
        } else {
          input.type = "password";
          btn.textContent = "👁";
        }
      }

      async function sendCode() {
        hideError("step1Error");
        const email = document.getElementById("email").value.trim();
        if (!email) return showError("step1Error", "Поштаңызды енгізіңіз");

        const btn = document.getElementById("sendCodeBtn");
        btn.disabled = true;
        btn.querySelector("span").textContent = "Жіберілуде...";

        try {
          const res = await fetch(`${API}/auth/send-reset-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();
          if (data.success) {
            document.getElementById("emailDisplay").textContent = email;
            verifiedEmail = email;
            setStep(2);
            startTimer(60);
          } else if (data.notRegistered) {
            showError(
              "step1Error",
              "Бұл email тіркелмеген. Тіркелу бетіне өтіңіз...",
            );
            setTimeout(() => {
              window.location.href = "register.html";
            }, 2000);
          } else {
            showError("step1Error", data.message || "Қате орын алды");
          }
        } catch {
          showError("step1Error", "Сервермен байланыс жоқ");
        }

        btn.disabled = false;
        btn.querySelector("span").textContent = "Код жіберу";
      }

      async function resendCode() {
        hideError("step2Error");
        const email = document.getElementById("email").value.trim();
        try {
          const res = await fetch(`${API}/auth/send-reset-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();
          if (data.success) {
            startTimer(60);
            document.getElementById("verifyCode").value = "";
          } else {
            showError("step2Error", data.message || "Қате орын алды");
          }
        } catch {
          showError("step2Error", "Сервермен байланыс жоқ");
        }
      }

      async function verifyCode() {
        hideError("step2Error");
        const email = document.getElementById("email").value.trim();
        const code = document.getElementById("verifyCode").value.trim();
        if (!code) return showError("step2Error", "Кодты енгізіңіз");

        try {
          const res = await fetch(`${API}/auth/verify-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, code }),
          });
          const data = await res.json();
          if (data.success) {
            clearInterval(timerInterval);
            setStep(3);
          } else {
            showError("step2Error", data.message || "Код дұрыс емес");
          }
        } catch {
          showError("step2Error", "Сервермен байланыс жоқ");
        }
      }

      function backToStep1() {
        clearInterval(timerInterval);
        hideError("step2Error");
        document.getElementById("verifyCode").value = "";
        setStep(1);
      }

      async function submitReset() {
        hideError("step3Error");
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (newPassword.length < 6)
          return showError(
            "step3Error",
            "Құпия сөз кемінде 6 таңбадан тұруы керек",
          );
        if (newPassword !== confirmPassword)
          return showError("step3Error", "Құпия сөздер сәйкес келмейді");

        const btn = document.getElementById("resetBtn");
        btn.disabled = true;
        btn.querySelector("span").textContent = "Сақталуда...";

        try {
          const res = await fetch(`${API}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: verifiedEmail,
              password: newPassword,
            }),
          });
          const data = await res.json();
          if (data.success) {
            setStep(4);
          } else {
            showError("step3Error", data.message || "Қате орын алды");
          }
        } catch {
          showError("step3Error", "Сервермен байланыс жоқ");
        }

        btn.disabled = false;
        btn.querySelector("span").textContent = "Сақтау";
      }
    </script>
  </body>
</html>
