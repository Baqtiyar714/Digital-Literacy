<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тест блоктарын таңдау — Цифрлық сауаттылықты бағалау</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="test.css" />
    <script src="translations.js" defer></script>

    <style>
      .quiz-start-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        background: linear-gradient(
          135deg,
          #1a237e 0%,
          #1a5276 60%,
          #0e6655 100%
        );
        border-radius: 16px;
        padding: 20px 28px;
        margin: 0 0 20px;
      }
      .quiz-start-banner__title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 4px;
      }
      .quiz-start-banner__desc {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.7);
        margin: 0;
      }
      .quiz-start-banner__btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: #fff;
        color: #1a237e;
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        border-radius: 999px;
        text-decoration: none;
        white-space: nowrap;
        flex-shrink: 0;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .quiz-start-banner__btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
      }
      @media (max-width: 600px) {
        .quiz-start-banner {
          flex-direction: column;
          text-align: center;
        }
        .quiz-start-banner__btn {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body data-page="test">
    <header class="app-header">
      <div class="app-header__inner">
        <div class="app-header__left">
          <a href="dashboard.html" class="app-logo">
            <div class="app-logo__icon">
              <span>◉</span>
            </div>
            <div class="app-logo__text" data-translate="siteName">
              Цифрлық сауаттылықты бағалау
            </div>
          </a>
        </div>
        <nav class="app-header__right">
          <a href="test.html" class="btn btn-primary">
            <span>📋</span>
            <span data-translate="takeTest">Тест тапсыру</span>
          </a>

          <a href="profile.html" class="btn btn-ghost">
            <span class="nav-icon profile-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4Zm0 2c-2.8 0-8 1.4-8 4v2h16v-2c0-2.6-5.2-4-8-4Z"
                />
              </svg>
            </span>
            <span data-translate="profile">Профиль</span>
          </a>

          <div class="lang-dropdown">
            <button
              type="button"
              class="lang-dropdown-trigger btn btn-outline"
              id="langDropdownBtn"
              aria-expanded="false"
              aria-haspopup="true"
              title="Тілді таңдау"
            >
              <span class="lang-dropdown-label">EN</span>
              <span class="lang-dropdown-arrow" aria-hidden="true">▼</span>
            </button>
            <div
              class="lang-dropdown-menu"
              id="langDropdownMenu"
              role="menu"
              aria-hidden="true"
            >
              <button
                type="button"
                class="lang-option"
                data-lang="en"
                role="menuitem"
              >
                EN
              </button>
              <button
                type="button"
                class="lang-option"
                data-lang="kk"
                role="menuitem"
              >
                KK
              </button>
              <button
                type="button"
                class="lang-option"
                data-lang="ru"
                role="menuitem"
              >
                RU
              </button>
            </div>
          </div>

          <button
            type="button"
            class="btn btn-outline"
            id="logoutBtn"
            data-translate="logout"
          >
            Шығу
          </button>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <!-- Page title + overall progress -->
      <section class="page-header">
        <div class="page-header__text">
          <h1 class="page-header__title">Тест тапсыру</h1>
          <p class="page-header__subtitle">Цифрлық сауаттылық деңгейіңізді анықтаңыз</p>
        </div>
        </div>
        </div>
      </section>

      <!-- Horizontal test cards list -->
      <!-- Start quiz button -->
      <div class="quiz-start-banner">
        <div class="quiz-start-banner__text">
          <h2 class="quiz-start-banner__title">Тестті бастауға дайынсыз ба?</h2>
          <p class="quiz-start-banner__desc">
            30 сұрақ · 5 блок · ~25 минут · DigComp 2.2 негізінде
          </p>
        </div>
        <a href="quiz.html" class="quiz-start-banner__btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path
              d="M5 12h14M13 6l6 6-6 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          Сынақты бастау
        </a>
      </div>
    </main>
  </body>
</html>
